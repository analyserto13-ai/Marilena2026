<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Marilena 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="shortcut icon" type="image/png" href="icon-192.png">
<meta name="theme-color" content="#FBF7EE">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,650&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#FBF7EE;
    --ink:#2B2620;
    --red:#C0463C;
    --sage:#7A8B6F;
    --surface:#FFFFFF;
    --muted:#8A8174;
    --border:#E8DFCB;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:calc(72px + env(safe-area-inset-bottom));
  }
  h1,h2,h3{
    font-family:'Fraunces', serif;
    font-weight:650;
    margin:0;
  }
  #loginScreen{
    position:fixed; inset:0;
    background:var(--paper);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:24px; z-index:999;
  }
  #loginScreen .mark{
    width:64px;height:64px;border-radius:18px;background:var(--red);
    display:flex;align-items:center;justify-content:center;
    color:white;font-family:'Fraunces',serif;font-size:30px;font-weight:650;
  }
  #loginScreen input{
    font-size:20px; padding:14px 16px; border-radius:12px;
    border:2px solid var(--border); width:240px; text-align:center;
    background:var(--surface); color:var(--ink);
  }
  #loginScreen input:focus{outline:2px solid var(--sage); border-color:var(--sage);}
  #loginScreen button{
    font-size:16px; padding:13px 28px; border-radius:12px; border:none;
    background:var(--ink); color:var(--paper); font-weight:600;
  }
  #loginError{color:var(--red); font-size:14px; min-height:18px;}

  header.topbar{
    padding:22px 18px 14px;
    position:relative;
  }
  header.topbar .dots{
    position:absolute; top:8px; left:0; right:0;
    display:flex; gap:10px; justify-content:center;
  }
  header.topbar .dots span{
    width:6px;height:6px;border-radius:50%;background:var(--border);
  }
  header.topbar h1{font-size:26px; margin-top:6px;}
  header.topbar p{margin:2px 0 0; color:var(--muted); font-size:14px;}

  main{padding:0 16px;}
  .view{display:none;}
  .view.active{display:block;}

  .day-label{
    font-family:'Fraunces',serif; font-weight:650; font-size:15px;
    color:var(--red); margin:22px 0 8px; padding-left:2px;
  }
  .day-label:first-child{margin-top:6px;}

  .card{
    background:var(--surface);
    border-radius:var(--radius);
    border-left:4px solid var(--red);
    box-shadow:0 1px 3px rgba(43,38,32,0.06);
    padding:12px 14px;
    margin-bottom:10px;
    display:flex; justify-content:space-between; gap:10px; align-items:flex-start;
  }
  .card.entry{border-left-color:var(--sage);}
  .card .info{flex:1; min-width:0;}
  .card .time{font-weight:700; font-size:15px;}
  .card .subj{font-size:15px; margin-top:2px;}
  .card .meta{font-size:13px; color:var(--muted); margin-top:2px;}
  .card .note{font-size:13px; color:var(--ink); margin-top:6px; background:#FBF3DD; padding:6px 8px; border-radius:8px;}
  .card .actions{display:flex; gap:6px; flex-shrink:0;}
  .card .actions button{
    border:none; background:none; font-size:18px; padding:4px; cursor:pointer; color:var(--muted);
  }
  .card img.thumb{
    width:100%; max-width:260px; border-radius:10px; margin-top:8px; display:block;
  }

  .empty{
    text-align:center; color:var(--muted); padding:40px 20px; font-size:14px;
  }

  #monthBar{
    display:flex; align-items:center; justify-content:space-between; gap:10px; margin:8px 0 16px;
  }
  #monthBar button{
    width:38px;height:38px;border-radius:50%; border:1px solid var(--border); background:var(--surface);
    color:var(--ink); font-size:14px;
  }
  #monthLabel{
    font-family:'Fraunces',serif; font-weight:650; font-size:17px; flex:1; text-align:center;
  }

  .label-badge{
    display:inline-block; padding:3px 12px; border-radius:20px; font-size:14px; font-weight:700; color:white;
  }
  .label-red{background:#C0463C;}
  .label-yellow{background:#C9A227; color:#2B2620;}
  .label-pink{background:#C9719C;}
  .label-green{background:#7A8B6F;}

  .label-picker{display:flex; gap:12px; margin-top:4px;}
  .label-swatch{width:32px;height:32px;border-radius:50%; border:2px solid var(--border); padding:0; cursor:pointer;}
  .label-swatch.selected{border-color:var(--ink); box-shadow:0 0 0 2px var(--paper), 0 0 0 4px var(--ink);}

  .header-actions{
    position:absolute; top:18px; right:14px; display:flex; align-items:center; gap:12px;
  }
  .settings-btn{
    background:none; border:none; font-size:19px; color:var(--muted); padding:4px;
  }
  .logout-btn{
    background:var(--border); border:none; font-size:12px; font-weight:700; color:var(--ink);
    padding:6px 12px; border-radius:14px;
  }

  #printOverlay{
    display:none; position:fixed; inset:0; background:white; z-index:500;
    flex-direction:column; align-items:center; padding:24px; overflow-y:auto;
  }
  #printOverlay.show{display:flex;}
  #printOverlay img{max-width:100%; max-height:65vh; object-fit:contain; border-radius:8px;}
  #printOverlay p{font-family:-apple-system,sans-serif; color:var(--ink); padding:0 10px; text-align:left; width:100%;}
  #printOverlay .print-actions{display:flex; gap:10px; margin-top:18px; width:100%; max-width:340px;}
  #printOverlay .print-actions button{flex:1; padding:13px; border-radius:12px; border:none; font-weight:600; font-size:15px;}

  @media print{
    body > *:not(#printOverlay){display:none !important;}
    #printOverlay{position:static !important; display:block !important; padding:0;}
    #printOverlay .print-actions{display:none !important;}
  }

  .fab{
    position:fixed; bottom:calc(84px + env(safe-area-inset-bottom)); right:18px;
    width:56px;height:56px;border-radius:50%; background:var(--red); color:white;
    border:none; font-size:26px; box-shadow:0 4px 10px rgba(192,70,60,0.4);
    z-index:50;
  }

  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0;
    background:var(--surface); border-top:1px solid var(--border);
    display:flex; padding-bottom:env(safe-area-inset-bottom);
    z-index:60;
  }
  nav.tabbar button{
    flex:1; background:none; border:none; padding:12px 0 10px;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:var(--muted); font-size:12px; font-weight:600;
  }
  nav.tabbar button .ic{font-size:20px;}
  nav.tabbar button.active{color:var(--red);}

  .modal-backdrop{
    position:fixed; inset:0; background:rgba(43,38,32,0.45);
    display:none; align-items:flex-end; justify-content:center; z-index:200;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    background:var(--paper); border-radius:20px 20px 0 0; width:100%; max-width:480px;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom)); max-height:88vh; overflow-y:auto;
  }
  .modal h2{font-size:20px; margin-bottom:14px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:13px; color:var(--muted); margin-bottom:4px; font-weight:600;}
  .field input, .field select, .field textarea{
    width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--border);
    font-size:15px; background:var(--surface); color:var(--ink); font-family:inherit;
  }
  .field textarea{min-height:90px; resize:vertical;}
  .row2{display:flex; gap:10px;}
  .row2 .field{flex:1;}
  .modal-actions{display:flex; gap:10px; margin-top:16px;}
  .modal-actions button{
    flex:1; padding:13px; border-radius:12px; border:none; font-weight:600; font-size:15px;
  }
  .btn-primary{background:var(--ink); color:var(--paper);}
  .btn-secondary{background:var(--border); color:var(--ink);}
  .btn-ocr{
    background:var(--sage); color:white; width:100%; padding:11px; border-radius:10px;
    border:none; font-weight:600; margin-top:6px; font-size:14px;
  }
  .photo-preview{width:100%; border-radius:10px; margin-top:8px; display:none;}
  .hint{font-size:12px; color:var(--muted); margin-top:4px;}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="mark">&#10084;</div>
  <h1 style="font-size:22px;">Marilena 2026</h1>
  <input id="passcodeInput" type="password" inputmode="text" placeholder="Κωδικός" autocomplete="off">
  <div id="loginError"></div>
  <button onclick="tryLogin()">Είσοδος</button>
</div>

<div id="app" style="display:none;">

  <header class="topbar">
    <div class="dots"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="header-actions">
      <button class="logout-btn" onclick="logout()">&#8676; Έξοδος</button>
      <button class="settings-btn" onclick="changePasscodeFlow()">&#9881;</button>
    </div>
    <h1 id="headerTitle">Πρόγραμμα</h1>
    <p id="headerSubtitle"></p>
  </header>

  <main>
    <section class="view active" id="view-schedule"></section>

    <section class="view" id="view-diary">
      <div id="monthBar">
        <button onclick="changeMonth(-1)">&#9664;</button>
        <span id="monthLabel"></span>
        <button onclick="changeMonth(1)">&#9654;</button>
      </div>
      <div id="entriesList"></div>
    </section>

    <section class="view" id="view-notes">
      <div id="notesList"></div>
    </section>
  </main>

  <button class="fab" id="fabBtn" onclick="openAddModal()">+</button>

  <nav class="tabbar">
    <button class="active" data-tab="schedule" onclick="switchTab('schedule')">
      <span class="ic">&#128197;</span>Πρόγραμμα
    </button>
    <button data-tab="diary" onclick="switchTab('diary')">
      <span class="ic">&#128209;</span>Ημερολόγιο
    </button>
    <button data-tab="notes" onclick="switchTab('notes')">
      <span class="ic">&#128221;</span>Σημειώσεις
    </button>
  </nav>
</div>

<div class="modal-backdrop" id="scheduleModalBackdrop">
  <div class="modal">
    <h2 id="scheduleModalTitle">Νέο μάθημα</h2>
    <div class="field">
      <label>Ημέρα</label>
      <select id="f_day">
        <option>Δευτέρα</option><option>Τρίτη</option><option>Τετάρτη</option>
        <option>Πέμπτη</option><option>Παρασκευή</option><option>Σάββατο</option><option>Κυριακή</option>
      </select>
    </div>
    <div class="row2">
      <div class="field"><label>Ώρα από</label><input type="time" id="f_timeFrom"></div>
      <div class="field"><label>Ώρα έως</label><input type="time" id="f_timeTo"></div>
    </div>
    <div class="field"><label>Μάθημα</label><input type="text" id="f_subject" placeholder="π.χ. Παιδαγωγικά Ι"></div>
    <div class="field"><label>Αίθουσα / τόπος</label><input type="text" id="f_location" placeholder="προαιρετικό"></div>
    <div class="field"><label>Υπενθύμιση ειδοποίησης</label><input type="text" id="f_note" placeholder="π.χ. πρέπει να διαβάσω"></div>
    <input type="hidden" id="f_scheduleId">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="dismissOverlay('scheduleModalBackdrop')">Άκυρο</button>
      <button class="btn-primary" onclick="saveScheduleItem()">Αποθήκευση</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="entryModalBackdrop">
  <div class="modal">
    <h2 id="entryModalTitle">Νέα σημείωση</h2>
    <div class="field"><label>Ημερομηνία</label><input type="date" id="e_date"></div>
    <div class="field"><label>Μάθημα</label><input type="text" id="e_subject" placeholder="π.χ. Παιδαγωγικά Ι"></div>
    <div class="field">
      <label>Φωτογραφία τετραδίου</label>
      <input type="file" id="e_photo" accept="image/*" onchange="onPhotoSelected(event)">
      <img id="e_photoPreview" class="photo-preview">
      <button type="button" class="btn-ocr" id="ocrBtn" style="display:none;" onclick="runOcr()">&#128247; Μετατροπή φωτό σε κείμενο</button>
      <div class="hint" id="ocrHint"></div>
    </div>
    <div class="field"><label>Κείμενο / σημείωση</label><textarea id="e_notes" placeholder="Γράψε εδώ ή χρησιμοποίησε τη μετατροπή φωτό..."></textarea></div>
    <div class="field">
      <label>Ετικέτα</label>
      <div class="label-picker" id="labelPicker">
        <button type="button" class="label-swatch" style="background:var(--border);" onclick="selectLabel('')"></button>
        <button type="button" class="label-swatch" style="background:#C0463C;" onclick="selectLabel('red')"></button>
        <button type="button" class="label-swatch" style="background:#C9A227;" onclick="selectLabel('yellow')"></button>
        <button type="button" class="label-swatch" style="background:#C9719C;" onclick="selectLabel('pink')"></button>
      </div>
    </div>
    <input type="hidden" id="e_entryId">
    <input type="hidden" id="e_label">
    <input type="hidden" id="e_existingPhotoUrl">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="dismissOverlay('entryModalBackdrop')">Άκυρο</button>
      <button class="btn-primary" id="entrySaveBtn" onclick="saveEntry()">Αποθήκευση</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="noteModalBackdrop">
  <div class="modal">
    <h2 id="noteModalTitle">Νέα σημείωση</h2>
    <div class="field"><label>Τίτλος</label><input type="text" id="n_title" placeholder="π.χ. Δρομολόγια λεωφορείων"></div>
    <div class="field"><label>Link</label><input type="url" id="n_link" placeholder="https://..."></div>
    <div class="field"><label>Κείμενο</label><textarea id="n_text" placeholder="Σημειώσεις..."></textarea></div>
    <div class="field">
      <label>Φωτογραφία</label>
      <input type="file" id="n_photo" accept="image/*" onchange="onNotePhotoSelected(event)">
      <img id="n_photoPreview" class="photo-preview">
    </div>
    <input type="hidden" id="n_noteId">
    <input type="hidden" id="n_existingPhotoUrl">
    <div class="modal-actions">
      <button class="btn-secondary" onclick="dismissOverlay('noteModalBackdrop')">Άκυρο</button>
      <button class="btn-primary" id="noteSaveBtn" onclick="saveNote()">Αποθήκευση</button>
    </div>
  </div>
</div>

<div id="printOverlay">
  <img id="printImg">
  <p id="printNotes"></p>
  <div class="print-actions">
    <button class="btn-primary" onclick="doPrint()">Εκτύπωση</button>
    <button class="btn-secondary" onclick="dismissOverlay('printOverlay')">Κλείσιμο</button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzrTc-T5z0aX7pctXkuucG0FLbtE9ab8ZuIJIerWgKcEAXZ5W2wkLzeAGDkn5uzdzFy/exec';
const ONESIGNAL_APP_ID = '2d9a58e0-5b0b-47fe-b251-57865ce97fb8';

let schedule = [];
let entries = [];
let notes = [];
let selectedPhotoBase64 = null;
let selectedPhotoMime = null;

function tryLogin(){
  const code = document.getElementById('passcodeInput').value;
  apiPost({action:'checkPasscode', code:code}).then(function(res){
    if(res.ok && res.data.valid){
      sessionStorage.setItem('marilena_auth','1');
      showApp();
    } else {
      document.getElementById('loginError').textContent = 'Λάθος κωδικός';
    }
  }).catch(function(){
    document.getElementById('loginError').textContent = 'Σφάλμα σύνδεσης — έλεγξε το API_URL';
  });
}
document.getElementById('passcodeInput').addEventListener('keydown', function(e){ if(e.key==='Enter') tryLogin(); });

function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  loadSchedule();
  loadEntries();
  loadNotes();
  initOneSignal();
}

if(sessionStorage.getItem('marilena_auth')==='1'){ showApp(); }

function switchTab(tab){
  var btns = document.querySelectorAll('.tabbar button');
  for(var i=0;i<btns.length;i++){ btns[i].classList.toggle('active', btns[i].dataset.tab===tab); }
  document.getElementById('view-schedule').classList.toggle('active', tab==='schedule');
  document.getElementById('view-diary').classList.toggle('active', tab==='diary');
  document.getElementById('view-notes').classList.toggle('active', tab==='notes');
  var titles = {schedule:'Πρόγραμμα', diary:'Ημερολόγιο', notes:'Σημειώσεις'};
  document.getElementById('headerTitle').textContent = titles[tab];
  var openers = {schedule:openAddScheduleModal, diary:openAddEntryModal, notes:openAddNoteModal};
  document.getElementById('fabBtn').onclick = openers[tab];
}

var today = new Date();
var currentYear = today.getFullYear();
var currentMonth = today.getMonth(); // 0-11
var MONTH_NAMES = ['Ιανουάριος','Φεβρουάριος','Μάρτιος','Απρίλιος','Μάιος','Ιούνιος','Ιούλιος','Αύγουστος','Σεπτέμβριος','Οκτώβριος','Νοέμβριος','Δεκέμβριος'];

function changeMonth(delta){
  currentMonth += delta;
  if(currentMonth < 0){ currentMonth = 11; currentYear--; }
  if(currentMonth > 11){ currentMonth = 0; currentYear++; }
  renderEntries();
}

function apiPost(body){
  return fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(body)
  }).then(function(r){ return r.json(); });
}
var jsonpCounter = 0;
function apiGet(action, extraParams){
  extraParams = extraParams || '';
  return new Promise(function(resolve,reject){
    var cbName = 'cb_' + Date.now() + '_' + (jsonpCounter++);
    window[cbName] = function(res){ resolve(res); delete window[cbName]; script.remove(); };
    var script = document.createElement('script');
    script.src = API_URL + '?action=' + action + '&callback=' + cbName + extraParams;
    script.onerror = function(){ reject(new Error('JSONP error')); };
    document.body.appendChild(script);
  });
}

function loadSchedule(){
  apiGet('getSchedule').then(function(res){
    if(res.ok){ schedule = res.data; renderSchedule(); }
  });
}
var DAYS_SEIRA = ['Δευτέρα','Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή','Σάββατο','Κυριακή'];
function renderSchedule(){
  var el = document.getElementById('view-schedule');
  if(schedule.length===0){ el.innerHTML = '<div class="empty">Δεν υπάρχουν μαθήματα ακόμα.<br>Πάτησε + για να προσθέσεις.</div>'; return; }
  var html = '';
  DAYS_SEIRA.forEach(function(day){
    var items = schedule.filter(function(s){ return s.day===day; }).sort(function(a,b){ return a.timeFrom.localeCompare(b.timeFrom); });
    if(items.length===0) return;
    html += '<div class="day-label">' + day + '</div>';
    items.forEach(function(s){
      html += '' +
      '<div class="card">' +
        '<div class="info">' +
          '<div class="time">' + s.timeFrom + ' \u2013 ' + s.timeTo + '</div>' +
          '<div class="subj">' + escapeHtml(s.subject) + '</div>' +
          (s.location? '<div class="meta">&#128205; ' + escapeHtml(s.location) + '</div>':'') +
          (s.note? '<div class="note">&#128276; ' + escapeHtml(s.note) + '</div>':'') +
        '</div>' +
        '<div class="actions">' +
          '<button onclick="editScheduleItem(\'' + s.id + '\')">&#9998;</button>' +
          '<button onclick="deleteScheduleItem(\'' + s.id + '\')">&#128465;</button>' +
        '</div>' +
      '</div>';
    });
  });
  el.innerHTML = html;
}
function openAddScheduleModal(){
  document.getElementById('scheduleModalTitle').textContent = 'Νέο μάθημα';
  ['f_scheduleId','f_timeFrom','f_timeTo','f_subject','f_location','f_note'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('f_day').selectedIndex = 0;
  openOverlay('scheduleModalBackdrop');
}
function editScheduleItem(id){
  var s = schedule.find(function(x){ return x.id===id; });
  if(!s) return;
  document.getElementById('scheduleModalTitle').textContent = 'Επεξεργασία μαθήματος';
  document.getElementById('f_scheduleId').value = s.id;
  document.getElementById('f_day').value = s.day;
  document.getElementById('f_timeFrom').value = s.timeFrom;
  document.getElementById('f_timeTo').value = s.timeTo;
  document.getElementById('f_subject').value = s.subject;
  document.getElementById('f_location').value = s.location;
  document.getElementById('f_note').value = s.note;
  openOverlay('scheduleModalBackdrop');
}
function saveScheduleItem(){
  var id = document.getElementById('f_scheduleId').value;
  var item = {
    id: id || undefined,
    day: document.getElementById('f_day').value,
    timeFrom: document.getElementById('f_timeFrom').value,
    timeTo: document.getElementById('f_timeTo').value,
    subject: document.getElementById('f_subject').value,
    location: document.getElementById('f_location').value,
    note: document.getElementById('f_note').value
  };
  var action = id ? 'updateScheduleItem' : 'addScheduleItem';
  apiPost({action:action, item:item}).then(function(){ dismissOverlay('scheduleModalBackdrop'); loadSchedule(); });
}
function deleteScheduleItem(id){
  if(!confirm('Διαγραφή μαθήματος;')) return;
  apiPost({action:'deleteScheduleItem', id:id}).then(function(){ loadSchedule(); });
}

function loadEntries(){
  apiGet('getEntries').then(function(res){
    if(res.ok){ entries = res.data; renderEntries(); }
  });
}
function renderEntries(){
  document.getElementById('monthLabel').textContent = MONTH_NAMES[currentMonth] + ' ' + currentYear;
  var prefix = currentYear + '-' + String(currentMonth+1).padStart(2,'0');
  var list = entries.filter(function(e){ return e.date && e.date.indexOf(prefix)===0; })
    .sort(function(a,b){ return a.date.localeCompare(b.date); });
  var el = document.getElementById('entriesList');
  if(list.length===0){ el.innerHTML = '<div class="empty">Καμία σημείωση αυτόν τον μήνα.</div>'; return; }
  var html = '';
  var lastDate = null;
  list.forEach(function(e){
    if(e.date !== lastDate){
      var parts = e.date.split('-');
      html += '<div class="day-label">' + parts[2] + '/' + parts[1] + '/' + parts[0] + '</div>';
      lastDate = e.date;
    }
    var titleHtml = e.label
      ? '<span class="label-badge label-' + e.label + '">' + escapeHtml(e.subject||'') + '</span>'
      : (e.subject? '<div class="subj">' + escapeHtml(e.subject) + '</div>':'');
    html += '' +
    '<div class="card entry" onclick="editEntry(\'' + e.id + '\')" style="cursor:pointer;">' +
      '<div class="info">' +
        titleHtml +
        (e.notes? '<div class="meta">' + escapeHtml(e.notes) + '</div>':'') +
        (e.photoUrl? '<div class="meta" style="font-style:italic;">&#128247; έχει φωτογραφία</div>':'') +
      '</div>' +
      '<div class="actions">' +
        (e.photoUrl? '<button onclick="event.stopPropagation();printEntry(\'' + e.id + '\')">&#128424;</button>':'') +
        '<button onclick="event.stopPropagation();editEntry(\'' + e.id + '\')">&#9998;</button>' +
        '<button onclick="event.stopPropagation();deleteEntry(\'' + e.id + '\')">&#128465;</button>' +
      '</div>' +
    '</div>';
  });
  el.innerHTML = html;
}

function shareNote(id){
  var n = notes.find(function(x){ return x.id===id; });
  if(!n) return;
  var shareData = {
    title: n.title || 'Σημείωση',
    text: [n.title, n.text].filter(Boolean).join('\n'),
    url: n.link || undefined
  };
  if(navigator.share){
    navigator.share(shareData).catch(function(){});
  } else {
    var body = encodeURIComponent((n.text||'') + (n.link? '\n' + n.link : ''));
    var subject = encodeURIComponent(n.title || 'Σημείωση');
    window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
  }
}

function runOcr(){
  if(!selectedPhotoBase64) return;
  var btn = document.getElementById('ocrBtn');
  btn.textContent = 'Μετατρέπεται...';
  btn.disabled = true;
  preprocessForOcr(selectedPhotoBase64, selectedPhotoMime).then(function(processedBase64){
    return apiPost({action:'ocrImage', imageBase64:processedBase64, mimeType:'image/jpeg'});
  }).then(function(res){
    btn.textContent = 'Μετατροπή φωτό σε κείμενο';
    btn.disabled = false;
    if(res.ok){
      var ta = document.getElementById('e_notes');
      ta.value = (ta.value ? ta.value + '\n\n' : '') + res.data.text.trim();
      document.getElementById('ocrHint').textContent = 'Έγινε αυτόματη μετατροπή — έλεγξε/διόρθωσε το κείμενο.';
    } else {
      document.getElementById('ocrHint').textContent = 'Αποτυχία μετατροπής: ' + res.error;
    }
  }).catch(function(){
    btn.textContent = 'Μετατροπή φωτό σε κείμενο';
    btn.disabled = false;
    document.getElementById('ocrHint').textContent = 'Σφάλμα σύνδεσης κατά τη μετατροπή.';
  });
}

function preprocessForOcr(base64, mime){
  return new Promise(function(resolve){
    var img = new Image();
    img.onload = function(){
      var maxDim = 1800;
      var scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      var canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      var imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var d = imgData.data;
      var contrast = 1.5;
      for(var i=0; i<d.length; i+=4){
        var gray = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
        gray = (gray - 128) * contrast + 128;
        gray = gray < 0 ? 0 : (gray > 255 ? 255 : gray);
        d[i] = d[i+1] = d[i+2] = gray;
      }
      ctx.putImageData(imgData, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.92).split(',')[1]);
    };
    img.onerror = function(){ resolve(base64); };
    img.src = 'data:' + mime + ';base64,' + base64;
  });
}

}

    closeModal('noteModalBackdrop');
    closePrintOverlay();
  }
});

  document.getElementById(id).classList.remove('show');
  if(historyDepth>0){ history.back(); }
}
function escapeHtml(s){
  return (s||'').replace(/[&<>"']/g, function(c){
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
  });
}

function initOneSignal(){
  if(!ONESIGNAL_APP_ID || ONESIGNAL_APP_ID.indexOf('PASTE')===0) return;
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(function(OneSignal){
    OneSignal.init({ appId: ONESIGNAL_APP_ID, allowLocalhostAsSecureOrigin:true }).then(function(){
      OneSignal.Notifications.requestPermission();
    });
  });
}
